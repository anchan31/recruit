<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Remote Dialer - Nextgen Recruitment Suite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Remote Dialer">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent: #3b82f6;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }
        html, body {
            height: 100%;
            height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-deep);
        }
        body {
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            width: 100%;
            -webkit-font-smoothing: antialiased;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            position: relative;
        }

        /* Animated Mesh Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
            z-index: -1;
            animation: mesh-fade 8s ease-in-out infinite alternate;
        }

        @keyframes mesh-fade {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Bottom Sheet Style */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            border-top: 1px solid var(--border);
            border-radius: 2rem 2rem 0 0;
            padding: 2.5rem 1.5rem;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 100;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: pulse-animation 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.85); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-offline { background: #ef4444; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.6s ease-out forwards;
        }

        .dial-button {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        .safe-bottom {
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
        }
        input::placeholder {
            color: rgba(148, 163, 184, 0.3);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-center">

    <!-- Network Status -->
    <div id="network-status" class="fixed top-0 left-0 right-0 z-[60] flex items-center justify-center p-2 text-[10px] font-black uppercase tracking-widest transition-all duration-500 opacity-0 -translate-y-full">
        <span class="status-dot status-online"></span>
        <span id="status-text">System Online</span>
    </div>

    <!-- Auth Layer -->
    <div id="auth-layer" class="fixed inset-0 z-50 bg-[#0f172a] flex items-center justify-center p-8 transition-opacity duration-700">
        <div class="w-full max-w-sm space-y-8 animate-fade-in text-center">
            <div class="mb-8 flex flex-col items-center">
                <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-4xl shadow-2xl mb-6 transform rotate-12">
                    <i class="fas fa-users-rays -rotate-12"></i>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Remote Dialer</h1>
                <p class="text-slate-400 text-sm mt-3 font-medium">Sync with your HR dashboard</p>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-800/50 border border-white/5 rounded-2xl p-4 pl-12 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" placeholder="Password" class="w-full bg-slate-800/50 border border-white/5 rounded-2xl p-4 pl-12 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 p-5 rounded-2xl font-black text-white shadow-xl shadow-blue-600/20 transition-all active:scale-[0.98]">
                    SIGN IN
                </button>
                <p id="error-msg" class="text-red-400 text-xs hidden"></p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden w-full max-w-md space-y-12 px-6">
        <header class="flex flex-col items-center space-y-4">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-500/10 rounded-full border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">
                <i class="fas fa-satellite-dish animate-pulse"></i>
                <span id="user-status">Live Console</span>
            </div>
            <h2 class="text-xs text-slate-500 font-bold tracking-widest uppercase" id="user-email"></h2>
        </header>

        <div class="glass-card rounded-[3rem] p-12 space-y-10 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-60 h-60 bg-blue-500/10 rounded-full blur-[80px]"></div>
            <div class="absolute -bottom-20 -left-20 w-60 h-60 bg-indigo-500/10 rounded-full blur-[80px]"></div>
            
            <div id="pending-state" class="space-y-8 py-4">
                <div class="relative w-32 h-32 mx-auto">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring" style="animation-delay: 0.6s"></div>
                    <div class="w-32 h-32 rounded-full bg-slate-800/80 border border-white/5 flex items-center justify-center text-slate-600 text-4xl">
                        <i class="fas fa-phone-slash"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <p class="text-white font-bold text-lg">Ready for Calls</p>
                    <p class="text-slate-500 text-sm">Awaiting connection from dashboard</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6">
            <div class="flex items-center gap-6 opacity-40 grayscale">
                <i class="fab fa-android text-2xl"></i>
                <i class="fas fa-shield-halved text-2xl"></i>
                <i class="fas fa-wifi text-2xl"></i>
            </div>
            <button onclick="logout()" class="text-slate-600 hover:text-white text-[10px] font-black uppercase tracking-widest transition-colors border-b border-transparent hover:border-white/20 pb-1">Sign Out Console</button>
        </div>
    </div>

    <!-- Call Bottom Sheet -->
    <div id="call-sheet" class="bottom-sheet">
        <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-8"></div>
        <div class="text-center space-y-8">
            <div class="space-y-2">
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em]">Incoming Request</p>
                <h1 class="text-4xl font-black text-white" id="candidate-name">Candidate Name</h1>
                <p class="text-slate-400 text-xl font-medium tracking-tight" id="candidate-phone">0000000000</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button id="manual-dial-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-6 rounded-3xl font-black text-xl shadow-2xl shadow-emerald-600/30 active:scale-[0.97] transition-all flex items-center justify-center gap-4">
                    <i class="fas fa-phone-flip text-2xl animate-bounce"></i> 
                    ACCEPT & DIAL
                </button>
                <button onclick="dismissCall()" class="w-full bg-slate-800 text-slate-400 py-4 rounded-2xl font-bold text-sm active:scale-[0.97] transition-all">
                    IGNORE REQUEST
                </button>
            </div>
            
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Calls are handled through your local carrier</p>
        </div>
    </div>

    <footer class="fixed bottom-6 safe-bottom left-0 right-0 text-slate-600 text-[10px] font-black uppercase tracking-widest italic">
        Om shree shyaam devay namah
    </footer>

    <script type="module">
        import { auth, db, onAuthStateChanged, signInWithEmailAndPassword, signOut, doc, onSnapshot, updateDoc, serverTimestamp } from "./firebase_config.js";

        let swRegistration = null;
        let wakeLock = null;

        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered');
                    swRegistration = reg;
                }).catch(err => console.log('SW Fail', err));
            });
        }

        // Network Status Logic
        function updateNetworkStatus() {
            const statusEl = document.getElementById('network-status');
            const statusText = document.getElementById('status-text');
            const dot = statusEl.querySelector('.status-dot');

            if (navigator.onLine) {
                statusText.innerText = "System Online";
                dot.className = "status-dot status-online";
                statusEl.classList.remove('bg-red-500/20', 'text-red-400');
                statusEl.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-b', 'border-emerald-500/20');
                setTimeout(() => statusEl.classList.add('opacity-0', '-translate-y-full'), 3000);
            } else {
                statusText.innerText = "Connection Lost";
                dot.className = "status-dot status-offline";
                statusEl.classList.remove('opacity-0', '-translate-y-full', 'bg-emerald-500/10', 'text-emerald-400');
                statusEl.classList.add('bg-red-500/20', 'text-red-400', 'border-b', 'border-red-500/20');
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();

        // Screen Wake Lock
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock Active');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        // Haptics Helper
        function triggerHaptic(pattern = 10) {
            if ('vibrate' in navigator) {
                navigator.vibrate(pattern);
            }
        }

        // Notification Permission & Gesture Unlock
        document.addEventListener('click', () => {
            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
            triggerHaptic(5); // Feedback on unlock
        }, { once: true });

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-layer').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    document.getElementById('user-email').innerText = user.email;
                }, 700);
                setupCallListener(user.uid);
                requestWakeLock();
            } else {
                document.getElementById('auth-layer').classList.remove('hidden');
                document.getElementById('auth-layer').style.opacity = '1';
                document.getElementById('main-content').classList.add('hidden');
                if (wakeLock) wakeLock.release().then(() => wakeLock = null);
            }
        });

        const loginBtn = document.getElementById('login-btn');
        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) return;
            
            triggerHaptic(20);
            loginBtn.innerText = 'CONNECTING...';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                const errEl = document.getElementById('error-msg');
                errEl.innerText = err.message;
                errEl.classList.remove('hidden');
                loginBtn.innerText = 'SIGN IN';
                triggerHaptic([50, 30, 50]);
            }
        };

        window.logout = () => {
            triggerHaptic(50);
            signOut(auth);
        };

        function setupCallListener(uid) {
            const docRef = doc(db, "remote_calls", uid);
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.status === 'pending') {
                        const now = Date.now();
                        const callTime = data.timestamp ? data.timestamp.toMillis() : now;
                        
                        if (now - callTime < 20000) { // 20 second window
                            triggerCall(data);
                        }
                    }
                }
            });
        }

        async function triggerCall(data) {
            // Update UI
            document.getElementById('candidate-name').innerText = data.candidateName;
            document.getElementById('candidate-phone').innerText = data.phoneNumber;
            
            // Slide up Bottom Sheet
            const sheet = document.getElementById('call-sheet');
            sheet.classList.add('active');

            // Haptic Pulse for Incoming Call
            const vibrationId = setInterval(() => {
                if (sheet.classList.contains('active')) {
                    triggerHaptic([200, 100, 200]);
                } else {
                    clearInterval(vibrationId);
                }
            }, 1000);

            // Setup Dial Button
            const dialBtn = document.getElementById('manual-dial-btn');
            dialBtn.onclick = async () => {
                triggerHaptic(50);
                window.location.href = "tel:" + data.phoneNumber;
                dismissCall();
                
                // Mark as dialed in Firestore
                const docRef = doc(db, "remote_calls", auth.currentUser.uid);
                await updateDoc(docRef, { status: 'dialed' });
            };

            // Show Notification via SW
            if (Notification.permission === 'granted' && document.visibilityState === 'hidden') {
                const title = "Incoming Call Request";
                const options = {
                    body: `Call ${data.candidateName} at ${data.phoneNumber}`,
                    icon: "icon-192.png",
                    badge: "icon-192.png",
                    tag: "remote-call",
                    renotify: true,
                    vibrate: [200, 100, 200]
                };

                if (swRegistration) {
                    swRegistration.showNotification(title, options);
                } else {
                    new Notification(title, options);
                }
            }
        }

        window.dismissCall = () => {
            document.getElementById('call-sheet').classList.remove('active');
            triggerHaptic(10);
        };

        window.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && auth.currentUser) {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
